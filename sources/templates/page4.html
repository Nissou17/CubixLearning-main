<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Sécurité - CubixLearning</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style/styles.css') }}">
</head>
<body>
    <div class="main-zone">
        <header>
            <img src="{{ url_for('static', filename='images/Felix.jpg') }}" alt="Logo" style="width: 50px; border-radius: 50%;">
            <h1>4 - Module Sécurité</h1>
        </header>

        <div class="secondary-zone">
            <div id="menu">
                <nav>
                    <ul>
                        <li><a href="/">Accueil</a></li>
                        <li><a href="/page1">Smartphone</a></li>
                        <li><a href="/page2">Ordinateur</a></li>
                        <li><a href="/page3">Dépannage</a></li>
                    </ul>
                </nav>
            </div>

            <div class="third-zone">
                <div id="about">
                    <h2>🛡️ Quiz Sécurité</h2>
                    <p>Apprenez à repérer les arnaques et à protéger vos données.</p>
                </div>

                <div class="cards-container" style="display: block; text-align: center; padding: 40px;">
                    <button class="btn-quiz" onclick="startQuiz()" style="background: #e74c3c; color: white; padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1em;">🚀 Lancer le Quiz</button>

                    <div id="quiz" style="display: none; background: white; color: black; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: left; border: 3px solid #95dac8;">
                        <div id="question-text" style="font-weight: bold; margin-bottom: 10px; color: #2c3e50;"></div>
                        <div id="options"></div>
                        <p id="feedback" style="margin-top:10px; font-weight:bold;"></p>
                    </div>
                </div>

                <div id="contact">
                    <a href="/" style="text-decoration: none; color: inherit; font-weight: bold;">⬅ Retour à l'accueil</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Vous recevez un mail de 'La Banque' demandant votre code secret. Que faites-vous ?",
                options: ["Je réponds vite", "Je supprime le mail direct", "Je donne mon code"],
                correct: 1
            }
        ];
        let currentQ = 0;
        function startQuiz() {
            document.querySelector('.btn-quiz').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            showQuestion();
        }
        function showQuestion() {
            const q = questions[currentQ];
            document.getElementById('question-text').innerText = q.q;
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('div');
                btn.style = "background: #f0f0f0; margin: 5px 0; padding: 10px; border-radius: 5px; cursor: pointer;";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsDiv.appendChild(btn);
            });
        }
        function checkAnswer(index) {
            const feedback = document.getElementById('feedback');
            if(index === questions[currentQ].correct) {
                feedback.innerText = "✅ Bravo !";
                feedback.style.color = "green";
                setTimeout(() => {
                    currentQ++;
                    if(currentQ < questions.length) {
                        feedback.innerText = "";
                        showQuestion();
                    } else {
                        document.getElementById('quiz').innerHTML = "<h2>🎉 Quiz terminé !</h2>";
                    }
                }, 1500);
            } else {
                feedback.innerText = "❌ Réessayez !";
                feedback.style.color = "red";
            }
        }
    </script>
</body>
</html>
