<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Quiz Smartphone - CubixLearning</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style/styles.css') }}">
    <style>
        .quiz-container { display: none; background: white; color: black; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: left; }
        .question { font-weight: bold; margin-bottom: 10px; color: #2c3e50; }
        .option { display: block; background: #f0f0f0; margin: 5px 0; padding: 10px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .option:hover { background: #95dac8; }
        .btn-quiz { background: #ffcc00; color: #2c3e50; padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="main-zone">
        <div class="secondary-zone">
            <div class="third-zone">
                <h1>📱 Module Smartphone</h1>
                
                <button class="btn-quiz" onclick="startQuiz()">🚀 Lancer le Quiz du Smartphone</button>

                <div id="quiz" class="quiz-container">
                    <div id="question-text" class="question"></div>
                    <div id="options"></div>
                    <p id="feedback" style="margin-top:10px; font-weight:bold;"></p>
                </div>

                <div style="margin-top: 30px;">
                    <a href="/" class="SearchBtn" style="text-decoration: none; color: white;">⬅ Retour</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Votre ordinateur n'a pas internet. Comment utiliser votre téléphone pour le connecter ?",
                options: ["Activer le partage de connexion", "Mettre le mode avion", "Éteindre le téléphone"],
                correct: 0,
                img: "partage_connexion.jpg"
            },
            {
                q: "Vous envoyez un message privé sur Facebook. Qui peut le voir ?",
                options: ["Tout le monde", "Seulement le destinataire", "Tous mes amis"],
                correct: 1,
                img: "fb_prive.jpg"
            },
            {
                q: "Au restaurant, comment voir la carte avec le petit carré noir et blanc (QR Code) ?",
                options: ["Prendre une photo normale", "Ouvrir l'appareil photo et viser le code", "Taper le nom du resto sur Google"],
                correct: 1,
                img: "qr_code.jpg"
            }
            // Tu peux ajouter les autres questions ici sur le même modèle
        ];

        let currentQ = 0;

        function startQuiz() {
            document.querySelector('.btn-quiz').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQ];
            document.getElementById('question-text').innerHTML = q.q;
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.innerHTML = opt;
                btn.onclick = () => checkAnswer(index);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(index) {
            const feedback = document.getElementById('feedback');
            if(index === questions[currentQ].correct) {
                feedback.innerHTML = "✅ Bravo ! C'est la bonne réponse.";
                feedback.style.color = "green";
                setTimeout(() => {
                    currentQ++;
                    if(currentQ < questions.length) {
                        feedback.innerHTML = "";
                        showQuestion();
                    } else {
                        document.getElementById('quiz').innerHTML = "<h2>🎉 Quiz terminé ! Vous êtes un pro du smartphone.</h2>";
                    }
                }, 2000);
            } else {
                feedback.innerHTML = "❌ Dommage... Réessayez !";
                feedback.style.color = "red";
            }
        }
    </script>
</body>
</html>
