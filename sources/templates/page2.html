<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Quiz Informatique</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style/styles.css') }}">
    <style>
        .quiz-container { display: none; background: white; color: black; padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .option { display: block; background: #eef2f7; margin: 10px 0; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid #3498db; }
        .option:hover { background: #3498db; color: white; transform: scale(1.02); }
        .btn-quiz { background: #3498db; color: white; padding: 20px 40px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.2em; margin: 20px; }
    </style>
</head>
<body>
    <div class="main-zone">
        <div class="secondary-zone">
            <div class="third-zone" style="text-align: center;">
                <h1>💻 Module Ordinateur</h1>
                <p>Maîtrisez les fichiers et les outils de votre PC.</p>

                <button class="btn-quiz" onclick="startQuiz()">🚀 Lancer le Quiz Ordinateur</button>

                <div id="quiz" class="quiz-container">
                    <div id="question-text" style="font-weight: bold; font-size: 1.1em; margin-bottom: 15px; color: #2c3e50;"></div>
                    <div id="options"></div>
                    <p id="feedback" style="margin-top:15px; font-weight:bold;"></p>
                </div>

                <div style="margin-top: 30px;"><a href="/" style="color: white; text-decoration: none;">⬅ Retour à l'accueil</a></div>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Comment transformer un document LibreOffice en PDF pour l'envoyer ?", options: ["Changer manuellement l'extension", "Aller dans Fichier > Exporter au format PDF", "Faire un copier-coller"], correct: 1 },
            { q: "Vous voulez montrer une erreur à l'écran à un proche. Que faites-vous ?", options: ["Une capture d'écran", "Une photo avec un appareil argentique", "Recopier le texte à la main"], correct: 0 },
            { q: "Vous avez supprimé une photo par erreur. Est-il possible de la retrouver ?", options: ["Non, c'est effacé définitivement", "Oui, en allant dans la Corbeille", "Seulement si l'ordinateur est resté allumé"], correct: 1 }
        ];
        let currentQ = 0;
        function startQuiz() { document.querySelector('.btn-quiz').style.display = 'none'; document.getElementById('quiz').style.display = 'block'; showQuestion(); }
        function showQuestion() {
            const q = questions[currentQ]; document.getElementById('question-text').innerText = q.q;
            const optionsDiv = document.getElementById('options'); optionsDiv.innerHTML = '';
            q.options.forEach((opt, i) => { const b = document.createElement('div'); b.className = 'option'; b.innerText = opt; b.onclick = () => check(i); optionsDiv.appendChild(b); });
        }
        function check(i) {
            const f = document.getElementById('feedback');
            if(i === questions[currentQ].correct) { f.innerText = "✅ Bravo !"; f.style.color = "green"; currentQ++; 
                if(currentQ < questions.length) { setTimeout(() => { f.innerText = ""; showQuestion(); }, 1000); }
                else { document.getElementById('quiz').innerHTML = "<h2>🎉 Quiz Ordinateur Terminé !</h2>"; }
            } else { f.innerText = "❌ Réessayez !"; f.style.color = "red"; }
        }
    </script>
</body>
</html>
